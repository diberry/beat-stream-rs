# cargo-deny configuration — supply chain security
# https://embarkstudios.github.io/cargo-deny/

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
]
confidence-threshold = 0.8

exceptions = [
    { allow = ["ISC", "MIT", "OpenSSL"], crate = "ring" },
]

[advisories]

[bans]
multiple-versions = "warn"
wildcards = "deny"
