name: Bug Report
description: Report a bug in beat-stream-rs
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the application is affected?
      options:
        - Backend (WebSocket server)
        - Frontend (Beat grid UI)
        - Audio (Tone.js / Web Audio)
        - Infrastructure (Azure / Docker)
        - CI/CD (GitHub Actions)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: |
        **What happened:**
        
        **Expected behavior:**
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the bug
      placeholder: |
        1. Open the app
        2. Connect to a room
        3. Toggle a beat rapidly
        4. Observe...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, and deployment info
      placeholder: |
        - Browser: Chrome 120
        - OS: Windows 11
        - Deployment: local / Azure Container Apps
        - Rust version (if relevant): 1.75

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Any error messages, console output, or server logs
      render: shell
